<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Freelance Tech — Landing</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {},
          fontFamily: { sans: ['ui-sans-serif','system-ui','-apple-system','Segoe UI','Roboto','Inter','Arial'] }
        }
      }
    }
  </script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- React 18 UMD + ReactDOM + Babel for JSX -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: radial-gradient(1200px 700px at 20% -10%, rgba(56,189,248,.15), transparent),
                   radial-gradient(1200px 700px at 120% 110%, rgba(56,189,248,.12), transparent),
                   #0b1220; }
  </style>
</head>
<body class="text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const SITE_DATA = {
      name: "Alex Dubois",
      title: "Software & Tech Solutions",
      tagline: "Helping creators and businesses choose, set up, and support the right software.",
      photoUrl: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=1200&auto=format&fit=crop",
      email: "contact@duboisdigital.ca",
      phone: "+1 (514) 555-0199",
      location: "Montreal, QC",
      socials: [
        { label: "Website", href: "https://duboisdigital.ca", icon: "globe" },
        { label: "LinkedIn", href: "https://www.linkedin.com/in/username", icon: "linkedin" },
        { label: "Instagram", href: "https://www.instagram.com/username", icon: "instagram" },
        { label: "Facebook", href: "https://www.facebook.com/username", icon: "facebook" },
        { label: "Email", href: "mailto:contact@duboisdigital.ca", icon: "mail" },
        { label: "Phone", href: "tel:+15145550199", icon: "phone" },
      ],
    };

    function SocialButton({ label, href, icon }) {
      React.useEffect(() => {
        // ensure lucide icons replaced after render
        window.lucide && window.lucide.createIcons();
      }, []);
      return (
        <a
          href={href}
          target="_blank"
          rel="noreferrer noopener"
          className="group inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-sm hover:bg-white/10 hover:border-white/20 transition"
        >
          <i data-lucide={icon} className="w-4 h-4 opacity-80 group-hover:opacity-100"></i>
          <span>{label}</span>
        </a>
      );
    }

    function App() {
      const { name, title, tagline, photoUrl, email, phone, location, socials } = SITE_DATA;
      return (
        <main className="min-h-screen">
          {/* Header */}
          <header className="sticky top-0 z-30 backdrop-blur bg-slate-900/40 border-b border-white/10">
            <div className="mx-auto max-w-6xl px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="size-9 rounded-xl bg-sky-500/20 ring-1 ring-sky-400/30 grid place-items-center">
                  <span className="text-sky-300 font-semibold">{(name || '').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()}</span>
                </div>
                <div className="leading-tight">
                  <p className="font-semibold tracking-tight">{name}</p>
                  <p className="text-xs text-slate-400">{title}</p>
                </div>
              </div>
              <nav className="hidden sm:flex items-center gap-6 text-sm text-slate-300">
                <a href="#about" className="hover:text-white transition">About</a>
                <a href="#contact" className="hover:text-white transition">Contact</a>
              </nav>
            </div>
          </header>

          {/* Hero */}
          <section className="mx-auto max-w-6xl px-6 pt-14 pb-10">
            <div className="grid lg:grid-cols-[420px_1fr] gap-10 items-center">
              <div className="relative">
                <div className="aspect-[4/5] overflow-hidden rounded-3xl ring-1 ring-white/10 shadow-2xl">
                  <img src={photoUrl} alt={name + ' portrait'} className="h-full w-full object-cover" />
                </div>
                <div className="absolute -bottom-4 -right-4 bg-slate-800/80 backdrop-blur rounded-2xl border border-white/10 px-4 py-2 text-sm text-slate-300 shadow-xl">
                  {location}
                </div>
              </div>

              <div>
                <h1 className="text-4xl md:text-5xl font-semibold tracking-tight">
                  {name}
                  <span className="block text-sky-300 text-xl md:text-2xl mt-2">{title}</span>
                </h1>
                <p className="mt-4 text-slate-300/90 leading-relaxed max-w-prose">{tagline}</p>

                {/* Socials */}
                <div className="mt-6 flex flex-wrap items-center gap-3">
                  {socials.map((s) => <SocialButton key={s.label} {...s} />)}
                </div>

                {/* Contact chips */}
                <div className="mt-4 flex flex-wrap gap-3 text-sm">
                  <a href={`mailto:${email}`} className="rounded-xl bg-sky-500/10 text-sky-200 ring-1 ring-sky-400/30 px-3 py-1.5 hover:bg-sky-500/20 transition">{email}</a>
                  <a href={`tel:${phone}`} className="rounded-xl bg-emerald-500/10 text-emerald-200 ring-1 ring-emerald-400/30 px-3 py-1.5 hover:bg-emerald-500/20 transition">{phone}</a>
                </div>

                <div className="mt-8">
                  <a href="#contact" className="inline-flex items-center justify-center rounded-2xl bg-white text-slate-950 px-5 py-3 font-medium shadow hover:shadow-lg active:scale-[0.98] transition">
                    Get in touch
                  </a>
                </div>
              </div>
            </div>
          </section>

          {/* About */}
          <section id="about" className="mx-auto max-w-6xl px-6 pb-16">
            <div className="grid md:grid-cols-2 gap-6">
              <div className="rounded-3xl bg-white/5 border border-white/10 p-6 shadow-xl">
                <h2 className="text-xl font-semibold">About</h2>
                <p className="mt-3 text-slate-300/90">
                  I help individuals and small businesses choose, license, and set up the right software — from Adobe Creative Cloud to productivity suites and collaboration tools. Clear pricing, fast setup, and friendly ongoing support.
                </p>
              </div>
              <div className="rounded-3xl bg-white/5 border border-white/10 p-6 shadow-xl">
                <h2 className="text-xl font-semibold">Services</h2>
                <ul className="mt-3 grid gap-2 text-slate-300/90">
                  <li>• Software sales & licensing guidance</li>
                  <li>• Installation & activation support</li>
                  <li>• Account & billing troubleshooting</li>
                  <li>• Ongoing tech support (as needed)</li>
                </ul>
              </div>
            </div>
          </section>

          {/* Contact */}
          <section id="contact" className="mx-auto max-w-6xl px-6 pb-24">
            <div className="rounded-3xl bg-gradient-to-br from-slate-800 to-slate-900 border border-white/10 p-6 md:p-8 shadow-2xl">
              <h2 className="text-xl font-semibold">Contact</h2>
              <p className="mt-2 text-slate-300/90">Prefer email or WhatsApp? Use the buttons below.</p>

              <div className="mt-5 flex flex-wrap gap-3">
                <a href={'mailto:' + SITE_DATA.email} className="inline-flex items-center gap-2 rounded-2xl bg-white text-slate-950 px-4 py-2 font-medium shadow hover:shadow-lg transition">
                  <i data-lucide="mail" className="w-4 h-4"></i> Email
                </a>
                <a href={'tel:' + SITE_DATA.phone} className="inline-flex items-center gap-2 rounded-2xl bg-white/10 border border-white/10 px-4 py-2 font-medium hover:bg-white/20 transition">
                  <i data-lucide="phone" className="w-4 h-4"></i> Call
                </a>
              </div>
            </div>
          </section>

          <footer className="border-t border-white/10">
            <div className="mx-auto max-w-6xl px-6 py-6 text-sm text-slate-400 flex items-center justify-between">
              <p>© {(new Date()).getFullYear()} {SITE_DATA.name}. All rights reserved.</p>
              <p>Built with <span className="text-sky-300">React + Tailwind (CDN)</span></p>
            </div>
          </footer>
        </main>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
